version: "3"

tasks:
  build:
    desc: Build control plane binary
    cmds:
      - go build -o bin/control_plane ./control_plane/cmd/usernet

  run:
    desc: Build and execute control plane
    deps: [build]
    cmds:
      - ./bin/control_plane

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
